<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>Chicken Game</title>
    <link rel="icon" type="image/png" href="./public/favicon.png" />
    <style>
      :root {
        --bg-top: #70d8ff;
        --bg-mid: #91e36c;
        --bg-bottom: #5fae45;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 56%, var(--bg-bottom) 100%);
        touch-action: none;
      }

      body {
        display: grid;
        place-items: stretch;
      }

      #game {
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
        transition: opacity 320ms ease;
      }

      #loading.hidden {
        opacity: 0;
      }

      .pulse {
        width: min(22vw, 120px);
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fff8, #ffd85c66 40%, #ff8b2f33 70%, transparent 72%);
        box-shadow: 0 0 22px #fff5, 0 0 50px #ffd00080;
        animation: pulse 1.4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.8);
          opacity: 0.75;
        }
        50% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="loading" aria-hidden="true"><div class="pulse"></div></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
